name: Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render deploy to complete
        run: |
          commit_sha="${{ github.sha }}"
          echo "Waiting for deploy of commit $commit_sha"
          while true; do
            response=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              -H "accept: application/json" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys?limit=5")
            deploy=$(echo "$response" | jq -r \
              --arg sha "$commit_sha" \
              '[.[].deploy | select(.commit.id | startswith($sha))] | first')
            if [ "$deploy" = "null" ] || [ -z "$deploy" ]; then
              echo "Deploy for $commit_sha not yet registered, waiting..."
              sleep 15
              continue
            fi
            status=$(echo "$deploy" | jq -r '.status')
            echo "Deploy status: $status"
            case $status in
              live)
                exit 0 ;;
              build_failed|update_failed|deactivated|canceled)
                echo "Deploy failed with status: $status"
                exit 1 ;;
            esac
            sleep 15
          done

  build-client:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
        name: Checkout

      - uses: actions/setup-node@v4
        name: Setup node
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}

      - uses: actions/upload-pages-artifact@v3
        name: Upload artifact
        with:
          path: client/dist

  deploy-client:
    runs-on: ubuntu-latest
    needs: build-client
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        name: Deploy client to GitHub Pages
        id: deploy
