name: Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout

      - uses: actions/setup-node@v4
        name: Setup node
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm i
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client

      - uses: actions/upload-pages-artifact@v3
        name: Upload artifact
        with:
          path: client/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        name: Deploy to GitHub Pages
        id: deploy
