databases:
  - name: tictactoe-db
    databaseName: tictactoe
    user: tictactoe
    plan: free

services:
  - type: web
    name: tictactoe-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tictactoe-db
          property: connectionString
      - key: NODE_ENV
        value: production
